name: 阶段任务
description: 为单个阶段创建可验证的工作项
title: "chore: "
labels: [task]
body:
  - type: textarea
    id: goal
    attributes:
      label: 目标与非目标
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准与验证方式
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: 所属阶段
      options:
        - PR-0 仓库基线
        - PR-1 Plant
        - PR-2 Observer
        - PR-3 Confidence / trigger
        - PR-4 Classification / control
        - PR-5 SIL / app / test agent
        - PR-6 Experiment / material freeze
    validations:
      required: true
