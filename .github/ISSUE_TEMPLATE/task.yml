name: 阶段任务
description: 为单个阶段创建可验证的工作项
title: "chore: "
labels: [task]
body:
  - type: textarea
    id: goal
    attributes:
      label: 目标与非目标
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准与验证方式
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: 所属阶段
      options:
        - PR-0 项目基础、数学模型与输入契约冻结
        - PR-1 Plant 输入修复与 P1 复验
        - PR-2 状态分类与 P2
        - PR-3 可信失效与 P3
        - PR-4 控制与系统集成
        - PR-5 SIL、App 与报告
        - PR-6 实验和材料冻结
    validations:
      required: true
